apiVersion: v1
kind: ServiceAccount
metadata:
  name: arachne
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: arachne
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: arachne
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: arachne
subjects:
  - kind: ServiceAccount
    name: arachne
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: arachne
  namespace: kube-system
  labels: { app: arachne }
spec:
  selector:
    matchLabels: { app: arachne }
  template:
    metadata:
      labels: { app: arachne }
    spec:
      serviceAccountName: arachne
      hostNetwork: true
      tolerations:
        - operator: Exists
      initContainers:
        - name: install-cni
          image: arachne:dev
          imagePullPolicy: Never
          securityContext: { privileged: true }
          command: ["cp", "/usr/local/bin/arachne", "/host/opt/cni/bin/arachne"]
          volumeMounts:
            - { name: cni-bin, mountPath: /host/opt/cni/bin }
      containers:
        - name: agent
          image: arachne:dev
          imagePullPolicy: Never
          securityContext: { privileged: true }
          command: ["/usr/local/bin/arachne-agent"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - { name: cni-cfg, mountPath: /etc/cni/net.d }
            - { name: bpffs, mountPath: /sys/fs/bpf, mountPropagation: Bidirectional }
            - { name: cgroup, mountPath: /sys/fs/cgroup }
      volumes:
        - { name: cni-bin, hostPath: { path: /opt/cni/bin, type: DirectoryOrCreate } }
        - { name: cni-cfg, hostPath: { path: /etc/cni/net.d, type: DirectoryOrCreate } }
        - { name: bpffs,   hostPath: { path: /sys/fs/bpf,    type: DirectoryOrCreate } }
        - { name: cgroup,  hostPath: { path: /sys/fs/cgroup, type: Directory } }
