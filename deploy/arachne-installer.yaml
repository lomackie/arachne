apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: arachne
  namespace: kube-system
  labels: { app: arachne }
spec:
  selector:
    matchLabels: { app: arachne }
  template:
    metadata:
      labels: { app: arachne }
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      initContainers:
        - name: install-cni
          image: arachne:dev
          imagePullPolicy: Never
          securityContext: { privileged: true }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              cp /usr/local/bin/arachne /host/opt/cni/bin/arachne
              cat > /host/etc/cni/net.d/10-arachne.conflist <<'EOF'
              {
                "cniVersion": "1.1.0",
                "name": "arachne",
                "plugins": [
                  { "type": "arachne" }
                ]
              }
              EOF
          volumeMounts:
            - { name: cni-bin, mountPath: /host/opt/cni/bin }
            - { name: cni-cfg, mountPath: /host/etc/cni/net.d }
      containers:
        - name: agent
          image: arachne:dev
          imagePullPolicy: Never
          securityContext: { privileged: true }
          command: ["/bin/sh", "-c", "sleep infinity"]
          volumeMounts:
            - { name: bpffs, mountPath: /sys/fs/bpf, mountPropagation: Bidirectional }
            - { name: cgroup, mountPath: /sys/fs/cgroup }
      volumes:
        - { name: cni-bin, hostPath: { path: /opt/cni/bin, type: DirectoryOrCreate } }
        - { name: cni-cfg, hostPath: { path: /etc/cni/net.d, type: DirectoryOrCreate } }
        - { name: bpffs,   hostPath: { path: /sys/fs/bpf,    type: DirectoryOrCreate } }
        - { name: cgroup,  hostPath: { path: /sys/fs/cgroup, type: Directory } }
